<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JunoVision — Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #080c14;
            --surface: #0d1320;
            --card: #111927;
            --border: rgba(99, 179, 255, 0.12);
            --accent: #3b82f6;
            --accent2: #06d6a0;
            --text: #e8f0ff;
            --muted: #6b7a99;
            --danger: #f43f5e;
            --white: #ffffff;
        }

        :root[data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --card: #ffffff;
            --border: rgba(59, 130, 246, 0.2);
            --accent: #2563eb;
            --accent2: #059669;
            --text: #0f172a;
            --muted: #64748b;
            --white: #0f172a;
        }

        :root[data-theme="light"] body::before {
            background-image: linear-gradient(rgba(37, 99, 235, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(37, 99, 235, 0.08) 1px, transparent 1px);
        }

        :root[data-theme="light"] #bg-canvas {
            opacity: 0.3; filter: invert(1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden; padding: 40px 0;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
            background-size: 48px 48px; pointer-events: none; z-index: 0;
        }

        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;
        }

        #mouse-orb {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 60%);
            pointer-events: none; z-index: 99; transform: translate(-50%, -50%);
            mix-blend-mode: screen; will-change: left, top;
        }

        :root[data-theme="light"] #mouse-orb {
            mix-blend-mode: multiply; background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, transparent 60%);
        }

        .glow-center {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(6, 214, 160, 0.15) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        :root[data-theme="light"] .glow-center {
            background: radial-gradient(circle, rgba(5, 150, 105, 0.1) 0%, transparent 60%);
        }

        .theme-btn {
            position: absolute; top: 24px; right: 24px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: var(--text); width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; z-index: 100;
        }
        .theme-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.1); }

        .login-card {
            background: rgba(17, 25, 39, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px; padding: 48px;
            width: 100%; max-width: 500px; position: relative; z-index: 10;
            animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem;
            color: var(--white); text-align: center; margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .logo .dot {
            width: 12px; height: 12px; background: var(--accent2); border-radius: 50%;
            box-shadow: 0 0 16px var(--accent2); animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .sub-text {
            text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 30px;
        }

        .role-toggle {
            display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 12px;
            padding: 4px; margin-bottom: 24px;
        }

        .role-toggle label {
            flex: 1; text-align: center; padding: 12px; font-size: 0.8rem;
            font-family: 'Syne', sans-serif; font-weight: 700; color: var(--muted);
            cursor: pointer; border-radius: 8px; transition: all 0.3s ease;
        }

        .role-toggle input { display: none; }

        .role-toggle input:checked + label {
            background: var(--accent); color: var(--white);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .input-group { margin-bottom: 20px; }

        .input-group label {
            display: block; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 16px; font-family: 'DM Mono', monospace; color: var(--white);
            font-size: 1rem; outline: none; transition: all 0.3s ease;
            appearance: none;
        }

        .input-group select option { background: var(--card); color: var(--white); }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent2); background: rgba(6, 214, 160, 0.05);
            box-shadow: 0 0 20px rgba(6, 214, 160, 0.2);
        }

        .btn-submit {
            width: 100%; background: var(--accent2); color: #000; border: none;
            border-radius: 12px; padding: 16px; font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden; margin-top: 10px;
        }

        .btn-submit:hover {
            background: #05b888; transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(6, 214, 160, 0.4);
        }

        .error-msg {
            background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.3);
            color: #fb7185; padding: 12px; border-radius: 8px; font-size: 0.8rem;
            text-align: center; margin-bottom: 24px;
        }

        .bottom-link {
            text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted);
        }

        .bottom-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .bottom-link a:hover { text-decoration: underline; }

        /* Conditional Rendering */
        #faculty-fields { display: none; }
        #student-fields { display: block; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
</head>
<body>
    <div id="mouse-orb"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="glow-center"></div>

    <button id="themeToggle" class="theme-btn">
        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="login-card">
        <div class="logo">
            <div class="dot"></div>
            JunoVision
        </div>
        <div class="sub-text">Universal Registration Portal</div>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form action="/signup" method="POST" enctype="multipart/form-data">
            <div class="role-toggle">
                <input type="radio" id="role_student" name="role" value="student" checked onchange="toggleFields()">
                <label for="role_student">New Student</label>
                
                <input type="radio" id="role_faculty" name="role" value="faculty" onchange="toggleFields()">
                <label for="role_faculty">New Faculty</label>
            </div>

            <!-- Common Fields -->
            <div class="input-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic" accept="image/*" style="padding: 12px; background: rgba(255, 255, 255, 0.03); cursor: pointer;">
            </div>

            <div class="input-group">
                <label>Unique Username</label>
                <input type="text" name="username" required autocomplete="off" placeholder="e.g. jatin07">
            </div>
            
            <div class="input-group" style="position: relative;">
                <label>Password</label>
                <input type="password" id="signup-password" name="password" required placeholder="••••••••" style="padding-right: 50px;">
                <span class="password-toggle" onclick="togglePassword('signup-password', this)" style="position: absolute; right: 16px; top: 34px; cursor: pointer; font-size: 1.2rem; user-select: none; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">🙈</span>
            </div>

            <div class="input-group" style="position: relative;">
                <label>Phone Number</label>
                <input type="text" id="phone" name="phone" required autocomplete="off" placeholder="e.g. +91 9876543210" style="padding-right: 120px;">
                <button type="button" onclick="sendOtp()" style="position: absolute; right: 8px; top: 32px; height: 38px; background: var(--accent); color: var(--white); border: none; border-radius: 8px; padding: 0 16px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">Send OTP</button>
            </div>
            
            <div class="input-group">
                <label>Enter OTP</label>
                <input type="text" name="otp" required autocomplete="off" placeholder="6-digit OTP">
            </div>

            <!-- Student Specific Fields -->
            <div id="student-fields">
                <div class="input-group">
                    <label>Actual Full Name (For AI Matching)</label>
                    <input type="text" id="actual_name" name="actual_name" placeholder="e.g. jatin">
                </div>
            </div>

            <!-- Faculty Specific Fields -->
            <div id="faculty-fields">
                <div class="input-group" style="position: relative;">
                    <label>Faculty Authorization Code</label>
                    <input type="password" name="auth_code" id="auth_code" placeholder="Enter Faculty Secret Key" style="padding-right: 50px;">
                    <span class="password-toggle" onclick="togglePassword('auth_code', this)" style="position: absolute; right: 16px; top: 34px; cursor: pointer; font-size: 1.2rem; user-select: none; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">🙈</span>
                </div>
            </div>

            <button type="submit" class="btn-submit">Register Account</button>
        </form>

        <div class="bottom-link">
            Already have an account? <a href="/login">Log In Here</a>
        </div>
    </div>
    
    <footer style="position: absolute; bottom: 0; width: 100%; text-align: center; padding: 20px; font-size: 0.75rem; color: var(--muted); z-index: 1;">
        © 2025 JunoVision | Created by Jatin Jain, Rohan Singh, Chahat Jain<br>
        <span style="font-style: italic; opacity: 0.8; margin-top: 8px; display: inline-block;">JunoVision — Empowering Attendance through Vision.</span>
    </footer>

    <script>
        function toggleFields() {
            const isStudent = document.getElementById('role_student').checked;
            const studentFields = document.getElementById('student-fields');
            const facultyFields = document.getElementById('faculty-fields');
            
            if (isStudent) {
                studentFields.style.display = 'block';
                facultyFields.style.display = 'none';
                
                document.getElementById('actual_name').required = true;
                if (document.getElementById('auth_code')) document.getElementById('auth_code').required = false;
            } else {
                studentFields.style.display = 'none';
                facultyFields.style.display = 'block';
                
                document.getElementById('actual_name').required = false;
                if (document.getElementById('auth_code')) document.getElementById('auth_code').required = true;
            }
        }
        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.textContent = '🐵';
            } else {
                input.type = 'password';
                iconElement.textContent = '🙈';
            }
        }

        // Initialize state
        toggleFields();
        
        function sendOtp() {
            const phone = document.getElementById('phone').value;
            if (!phone) {
                alert('Please enter a phone number first.');
                return;
            }
            
            // Clean phone for MSG91 (requires digits only with country code, e.g. 919876543210)
            let cleanPhone = phone.replace(/\D/g, '');
            if (cleanPhone.length === 10) {
                cleanPhone = "91" + cleanPhone;
            }
            
            // Configure MSG91 OTP Widget
            var configuration = {
              widgetId: "36654277734e353239383135",
              tokenAuth: "520819TezOMDErmH6a18d090P1",
              identifier: cleanPhone,
              success: (data) => {
                  console.log('success response', data);
                  
                  // Extract the JWT verified token string
                  let token = "";
                  if (data && typeof data === 'object') {
                      token = data.token || data.message || JSON.stringify(data);
                  } else {
                      token = data;
                  }
                  
                  // Fill the OTP input box with verified access-token
                  const otpInput = document.querySelector('input[name="otp"]');
                  if (otpInput) {
                      otpInput.value = token;
                      otpInput.style.borderColor = 'var(--accent2)';
                      otpInput.style.background = 'rgba(6, 214, 160, 0.05)';
                  }
                  alert('OTP verified successfully via MSG91 Widget! You may now submit your registration.');
              },
              failure: (error) => {
                  console.log('failure reason', error);
                  alert('OTP Widget Verification Error: ' + JSON.stringify(error));
              }
            };
            
            if (typeof window.initSendOTP === 'function') {
                window.initSendOTP(configuration);
            } else {
                console.log("MSG91 OTP Widget script not loaded yet. Falling back to simulated Sandbox OTP.");
                fallbackSendOtp(phone);
            }
        }
        
        function fallbackSendOtp(phone) {
            fetch('/api/send_otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone: phone })
            })
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    alert(data.error);
                } else {
                    alert(data.message);
                    if (data.sandbox_otp) {
                        const otpInput = document.querySelector('input[name="otp"]');
                        if (otpInput) {
                            otpInput.value = data.sandbox_otp;
                            otpInput.style.borderColor = 'var(--accent2)';
                            otpInput.style.background = 'rgba(6, 214, 160, 0.05)';
                        }
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to send OTP.');
            });
        }

        // --- Load MSG91 OTP Widget Script ---
        (function loadOtpScript(urls) {
            let i = 0;
            function attempt() {
                const s = document.createElement('script');
                s.src = urls[i];
                s.async = true;
                s.onload = () => {
                    console.log("MSG91 OTP Provider Script Loaded Successfully!");
                };
                s.onerror = () => {
                    i++;
                    if (i < urls.length) {
                        attempt();
                    }
                };
                document.head.appendChild(s);
            }
            attempt();
        })([
            'https://verify.msg91.com/otp-provider.js',
            'https://verify.phone91.com/otp-provider.js'
        ]);

        // --- 3D PARTICLE NETWORK (THREE.JS) ---
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x080c14, 0.015);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 40;

            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 600;
            const posArray = new Float32Array(particlesCount * 3);

            for (let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 120;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const material = new THREE.PointsMaterial({
                size: 0.25,
                color: 0x3b82f6,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(particlesGeometry, material);
            scene.add(particlesMesh);

            let mouseX = 0;
            let mouseY = 0;
            let targetX = 0;
            let targetY = 0;
            const windowHalfX = window.innerWidth / 2;
            const windowHalfY = window.innerHeight / 2;

            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX - windowHalfX) * 0.05;
                mouseY = (event.clientY - windowHalfY) * 0.05;
            });

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                targetX = mouseX * 0.001;
                targetY = mouseY * 0.001;

                particlesMesh.rotation.y += 0.002;
                particlesMesh.rotation.x += 0.001;
                particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
                particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- ORB FOLLOWER ---
        const orb = document.getElementById('mouse-orb');
        document.addEventListener('mousemove', (e) => {
            orb.style.left = e.clientX + 'px';
            orb.style.top = e.clientY + 'px';
        });

        // --- THEME TOGGLE ---
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        themeToggle.addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (isLight) {
                document.documentElement.removeAttribute('data-theme');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
                localStorage.setItem('theme', 'light');
            }
        });

        // Persist Theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }

        // --- 3D TILT EFFECT ---
        const card = document.querySelector('.login-card');
        if (card) {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -4;
                const rotateY = ((x - centerX) / centerX) * 4;

                card.style.transform = `perspective(1000px) scale(1.02) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                card.style.transition = 'transform 0.1s ease-out';
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) scale(1) rotateX(0deg) rotateY(0deg)';
                card.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
            });
        }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
</body>
</html>
